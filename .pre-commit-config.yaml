repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
        exclude_types:
          - markdown
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-toml
    -   id: check-added-large-files
-   repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
    -   id: isort
        name: isort (python)
        args: [--line-length=120]
-   repo: local
    hooks:
      - id: update-date
        name: Check __date__ variable in .py files
        entry: python ./hooks/update-date.py
        language: python
        pass_filenames: true
        types: [python]
      - id: update-version
        name: Sync __version__ with pyproject.toml
        entry: python ./hooks/update-version.py
        language: python
        pass_filenames: true
        types: [python]
